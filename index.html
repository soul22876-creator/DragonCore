<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #0a0f1c;
    color: white;
    overflow-x: hidden;
}

/* Sidebar */
.sidebar {
    width: 260px;
    height: 100vh;
    position: fixed;
    background: #0f172a;
    padding: 20px;
    border-right: 1px solid #1e293b;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #00ffcc;
    margin-bottom: 30px;
}

.nav button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    background: #111827;
    border: 1px solid #1f2937;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.nav button:hover {
    background: #00ffcc;
    color: black;
}

/* Main */
.main {
    margin-left: 280px;
    padding: 20px;
}

/* Top Bar */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.status {
    padding: 8px 14px;
    border-radius: 20px;
    background: #052e1b;
    color: #00ff99;
    border: 1px solid #00ff99;
}

/* Cards */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.card {
    background: linear-gradient(145deg, #0f172a, #111827);
    padding: 20px;
    border-radius: 15px;
    border: 1px solid #1f2937;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    border-color: #00ffcc;
}

.card h3 {
    margin: 0;
    color: #00ffcc;
}

/* Console */
.console {
    background: black;
    padding: 15px;
    height: 220px;
    overflow-y: auto;
    border-radius: 12px;
    font-family: monospace;
    border: 1px solid #1f2937;
}

/* Buttons */
.btn {
    padding: 10px;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
    width: 100%;
}

.start { background: #00ff99; }
.stop { background: #ff3b3b; color:white; }
.restart { background: #facc15; }

</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">⚡ MINECRAFT PRO</div>
    <div class="nav">
        <button>Dashboard</button>
        <button>Players</button>
        <button>World</button>
        <button>Files</button>
        <button>Settings</button>
        <button>Backups</button>
    </div>
</div>

<div class="main">

    <div class="topbar">
        <h2>Server Dashboard</h2>
        <div class="status" id="status">🟢 Online</div>
    </div>

    <div class="grid">

        <div class="card">
            <h3>Server Control</h3>
            <button class="btn start" onclick="log('Server Started')">Start</button>
            <button class="btn stop" onclick="log('Server Stopped')">Stop</button>
            <button class="btn restart" onclick="log('Server Restarted')">Restart</button>
        </div>

        <div class="card">
            <h3>Players Online</h3>
            <p>Steve, Alex, Player123</p>
        </div>

        <div class="card">
            <h3>RAM Usage</h3>
            <p>2.1 GB / 8 GB</p>
        </div>

        <div class="card">
            <h3>CPU Load</h3>
            <p>35%</p>
        </div>

        <div class="card">
            <h3>Live Console</h3>
            <div class="console" id="console"></div>
        </div>

    </div>

</div>

<script>
let box = document.getElementById("console");
let status = document.getElementById("status");

function log(msg){
    box.innerHTML += ">> " + msg + "<br>";
    box.scrollTop = box.scrollHeight;
}

function setOnline(){
    status.innerHTML = "🟢 Online";
}

setOnline();
log("Dashboard loaded...");
</script>

</body>
</html>
